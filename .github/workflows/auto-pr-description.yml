name: Auto PR Description

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read
  pull-requests: write

jobs:
  fill-description:
    name: Fill empty PR description
    runs-on: ubuntu-latest

    steps:
      - name: Generate description
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            if (!pr) {
              core.info("No pull request found in the event payload.");
              return;
            }

            if (pr.body && pr.body.trim().length > 0) {
              core.info("PR description already exists. Leaving it unchanged.");
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = pr.number;

            const commits = await github.paginate(
              github.rest.pulls.listCommits,
              { owner, repo, pull_number, per_page: 100 }
            );

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number, per_page: 100 }
            );

            const commitMessages = commits
              .map((commit) => commit.commit.message.split("\n")[0])
              .filter((message) => message.trim().length > 0);

            const changedFiles = files.map((file) => {
              const change = [
                file.status,
                `${file.additions} additions`,
                `${file.deletions} deletions`
              ].join(", ");
              return `- \`${file.filename}\` (${change})`;
            });

            const summaryItems = commitMessages.length > 0
              ? commitMessages.map((message) => `- ${message}`)
              : ["- Updated project files"];

            const body = [
              "## Summary",
              ...summaryItems,
              "",
              "## Changed Files",
              ...changedFiles,
              "",
              "## Testing",
              "- Not run by this workflow",
              "",
              "## Risks",
              "- Review the changed files and test results before merging",
              "",
              "_This description was generated automatically by GitHub Actions._"
            ].join("\n");

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number,
              body
            });

            core.info(`Updated PR #${pull_number} description.`);
